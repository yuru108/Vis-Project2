<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vis-Project2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/leaflet.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/timeline.css" />
</head>
<body>
  <header class="header dashboard-header">
    <div class="header-kicker">Cincinnati's Service Requests</div>
    <h1>Cincinnati 311 Analytics</h1>
    <h2>Service Requests Across The Greater Cincinnati Area</h2>
  </header>

  <main class="dashboard-shell">
    <section class="panel map-panel">
      <div class="panel-title-row">
        <h3>Interactive Map</h3>
      </div>

      <section class="controls-panel">
        <label for="color-select">Color by</label>
        <select id="color-select">
          <option value="response">Response Time</option>
          <option value="neighborhood">Neighborhood</option>
          <option value="priority">Priority</option>
          <option value="department">Department</option>
        </select>
      </section>

      <section class="map-wrapper">
      <div id="my-map"></div>
      <div class="map-search-overlay">
        <button id="heatmap-toggle" type="button" class="heatmap-toggle" aria-pressed="false">Enable Heatmap</button>
        <button id="map-mode-toggle" type="button" class="map-mode-toggle" aria-pressed="false">Switch To Brush</button>
        <input id="service-type-search" type="search" placeholder="Search service types" aria-label="Search service types" />
        <details id="filters-section" class="filters-panel" open>
          <summary class="filters-summary-toggle">Visible Service Types</summary>
          <div id="service-type-list" class="service-type-list" aria-label="Service type list"></div>
          <p id="filter-summary" class="filter-summary"></p>
        </details>
      </div>
      </section>
    </section>

    <div id="tooltip" class="tooltip"></div>
    <p id="missing-data" class="missing-data-note"></p>

    <section id="timeline-section" class="panel">
      <h3>Timeline</h3>
      <button id="play-timeline">Play</button>
      <div id="timeline-chart"></div>
    </section>

    <section id="bar-charts" class="bar-charts-section panel">
      <h3>Request Counts</h3>
      <div id="service-type-legend" class="service-type-legend"></div>
      <div class="charts-grid">
        <div class="chart-card">
          <h4>Requests by Neighborhood</h4>
          <div id="chart-neighborhood" class="bar-chart"></div>
        </div>
        <div class="chart-card">
          <h4>Requests by Method Received</h4>
          <div id="chart-method" class="bar-chart"></div>
        </div>
        <div class="chart-card">
          <h4>Requests by Service Department</h4>
          <div id="chart-department" class="bar-chart"></div>
        </div>
        <div class="chart-card">
          <h4>Requests by Priority Level</h4>
          <div id="chart-priority" class="bar-chart"></div>
        </div>
      </div>
    </section>
    
  </main>

  <footer class="footer">
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="js/d3.v6.min.js"></script>
  <script src="js/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
  <script src="js/leafletMap.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/main.js"></script>
  <script src="js/barchart.js"></script>
</body>
</html>
